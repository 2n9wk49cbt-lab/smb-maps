<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Карта рекламной кампании</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link id="leafletCss" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root { --bg:#f5f7fb; --card:#ffffff; --text:#101828; --muted:#667085; --line:#e4e7ec; --accent:#2563eb; }
  * { box-sizing:border-box; }
  html, body { width:100%; height:100%; min-height:100%; margin:0; overflow:hidden; font-family:Inter, Arial, sans-serif; color:var(--text); background:var(--bg); }
  .page { width:100%; height:100vh; height:100dvh; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  header { background:var(--card); border-bottom:1px solid var(--line); padding:18px 24px; display:flex; gap:24px; align-items:flex-start; justify-content:space-between; }
  h1 { margin:0 0 6px; font-size:22px; line-height:1.2; }
  .subtitle { color:var(--muted); font-size:13px; }
  .metrics { display:flex; gap:12px; flex-wrap:wrap; justify-content:flex-end; }
  .metric { background:#f9fafb; border:1px solid var(--line); border-radius:12px; padding:10px 12px; min-width:130px; }
  .metric span { display:block; color:var(--muted); font-size:12px; }
  .metric b { display:block; font-size:18px; margin-top:2px; }
  .layout { flex:1 1 auto; min-height:0; height:calc(100vh - 88px); height:calc(100dvh - 88px); display:grid; grid-template-columns:340px minmax(0,1fr); }
  aside { background:var(--card); border-right:1px solid var(--line); overflow:auto; padding:14px; min-height:0; }
  main { position:relative; min-width:0; min-height:0; height:100%; overflow:hidden; }
  .aside-title { font-weight:700; margin:4px 0 12px; }
  .cart-box { border:1px solid var(--line); background:#f9fafb; border-radius:14px; padding:12px; margin-bottom:14px; }
  .cart-title { font-weight:800; margin-bottom:8px; }
  .cart-empty { color:var(--muted); font-size:12px; margin:6px 0 10px; }
  .cart-row { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; border-top:1px solid var(--line); padding:7px 0; font-size:12px; }
  .cart-row b { display:block; }
  .cart-row span { color:var(--muted); display:block; margin-top:2px; }
  .cart-remove { border:0; background:transparent; color:#b42318; cursor:pointer; font-weight:700; }
  .send-cart { width:100%; border:0; border-radius:10px; padding:9px 10px; background:#16a34a; color:white; font-weight:800; cursor:pointer; margin-top:8px; }
  .send-cart:disabled { background:#cbd5e1; cursor:not-allowed; }
  .sort-label { display:block; color:var(--muted); font-size:12px; margin:0 0 5px; }
  .sort-select { width:100%; border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:#fff; margin:0 0 10px; }
  .surface-row { position:relative; margin:0 0 8px; }
  .surface-item { width:100%; text-align:left; display:block; border:1px solid var(--line); background:#fff; border-radius:12px; padding:10px 82px 10px 11px; margin:0; cursor:pointer; color:var(--text); }
  .surface-item:hover { border-color:var(--accent); box-shadow:0 1px 8px rgba(37,99,235,.12); }
  .surface-item.active { border-color:var(--accent); background:#eff6ff; box-shadow:0 1px 10px rgba(37,99,235,.18); }
  .surface-item.in-cart { border-color:#16a34a; background:#f0fdf4; box-shadow:0 1px 8px rgba(22,163,74,.12); }
  .surface-item.in-cart strong::after { content:' · в корзине'; color:#16a34a; font-weight:800; }
  .surface-cart-toggle { position:absolute; top:9px; right:9px; border:0; border-radius:8px; background:#2563eb; color:#fff; padding:6px 8px; font-size:11px; font-weight:800; cursor:pointer; }
  .surface-cart-toggle.in-cart { background:#b42318; }
  .surface-item b, .surface-item span, .surface-item small, .surface-item strong { display:block; }
  .surface-item span { color:#344054; font-size:12px; margin-top:3px; }
  .surface-item small { color:var(--muted); font-size:11px; margin-top:4px; line-height:1.25; }
  .surface-item strong { margin-top:6px; font-size:12px; }
  #map { position:absolute; inset:0; width:100%; height:100%; min-height:0; background:#dbe3ea; z-index:1; }
  .map-loading, .map-error { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:24px; text-align:center; color:#344054; background:#dbe3ea; z-index:2; }
  .map-error { color:#b42318; background:#fff5f5; font-weight:700; }
  .popup { width:var(--popup-width, 410px); max-width:calc(100vw - 76px); font-size:var(--popup-font-size, 13px); line-height:1.28; }
  .combined-popup { max-height:none; overflow:visible; }
  .side-tabs { display:flex; gap:6px; margin:8px 0 10px; flex-wrap:wrap; }
  .side-tab { border:1px solid #d0d5dd; background:#fff; border-radius:8px; padding:6px 8px; cursor:pointer; font-size:12px; line-height:1.15; }
  .side-tab span { color:#667085; font-size:11px; margin-left:-6px; }
  .side-tab.active { border-color:#2563eb; background:#eff6ff; color:#1d4ed8; font-weight:700; }
  .side-panel { border-top:1px solid #e4e7ec; padding-top:8px; }
  .photo-frame { position:relative; width:100%; height:var(--photo-height, 190px); min-height:var(--photo-height, 190px); background:#f8fafc; margin:7px 0 0; border-radius:8px; border:1px solid #ddd; overflow:hidden; display:flex; align-items:center; justify-content:center; transition:height .16s ease, min-height .16s ease; }
  .photo { width:100%; height:100%; object-fit:contain; opacity:1; transition:opacity .18s ease; display:block; position:relative; z-index:1; transform-origin:center center; }
  .photo-frame.loaded .photo { opacity:1; }
  .photo-frame.zoomable { touch-action:none; }
  .photo-frame.zooming { overflow:visible; z-index:9999; background:#111; }
  .photo-frame.zooming .photo { transition:none; z-index:3; }
  .photo-frame.zooming::after { content:'двойной тап — сброс'; position:absolute; right:8px; bottom:7px; z-index:4; color:#fff; background:rgba(0,0,0,.48); border-radius:999px; padding:3px 7px; font-size:11px; margin-left:-6px; }
  .photo-loader { display:none !important; }
  .photo-frame.loaded .photo-loader, .photo-frame.failed .photo-loader { display:none !important; }
  .photo-loader span { display:none !important; }
  .photo-frame.loaded .photo-loader, .photo-frame.failed .photo-loader { display:none !important; opacity:0; pointer-events:none; visibility:hidden; transition:opacity .18s ease, visibility .18s ease; }
  .photo-failed { display:none; color:#667085; font-size:12px; padding:10px; text-align:center; }
  .photo-frame.failed .photo-failed { display:block; }
  .photo-frame.failed .photo { display:none; }
  .photo-frame.failed { height:auto; min-height:42px; }
  @keyframes oohSpin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  .no-photo { margin:8px 0; padding:8px; background:#f6f6f6; color:#666; border-radius:6px; }
  .links { margin-top:6px; }
  .status { margin-top:6px; padding:6px; background:#fafafa; border-radius:6px; color:#333; }
  .cart-add { margin-top:6px; width:100%; border:0; border-radius:8px; background:#2563eb; color:white; padding:7px 9px; cursor:pointer; font-weight:700; }
  .cart-add:hover { background:#1d4ed8; }
  .cart-add.in-cart { background:#b42318; }
  .cart-add.in-cart:hover { background:#912018; }
  .compact-card .status { padding:5px; }
  .muted { color:#777; }
  .month-list { margin-top:4px; }
  .month-row { display:grid; grid-template-columns:72px 72px 1fr; gap:5px; align-items:center; white-space:nowrap; margin:2px 0; font-size:12px; }
  .month-name { font-weight:500; }
  .month-price { text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
  .free { color:#167a2f; background:#e7f6ea; border-radius:4px; padding:1px 5px; font-weight:600; text-align:center; }
  .sold { color:#a51616; background:#fde8e8; border-radius:4px; padding:1px 5px; font-weight:600; text-align:center; }
  .reserve { color:#9a5a00; background:#fff3cd; border-radius:4px; padding:1px 5px; font-weight:600; text-align:left; }
  .month-status-compact { grid-column:2 / 4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.15; }
  .month-row.reserve-priced .month-status-compact { grid-column:2; }
  .gid-label { background:white; border:1px solid #333; border-radius:3px; padding:1px 4px; font-weight:bold; font-size:11px; }
  .leaflet-popup-content { width:var(--popup-width, 410px) !important; max-width:calc(100vw - 76px) !important; margin:9px 11px; }
  .leaflet-popup-content-wrapper { max-height:var(--popup-max-height, min(560px, calc(100vh - 72px))); overflow:auto; border-radius:12px; }
  .leaflet-popup { max-width:calc(100vw - 48px); }
  .leaflet-popup-content-wrapper { -webkit-overflow-scrolling: touch; }
  .popup a, .popup button, .popup input, .popup select, .popup textarea, .side-tab { touch-action: manipulation; }
  @media (max-width: 700px) {
    .leaflet-popup { max-width:calc(100vw - 18px); }
    .leaflet-popup-content { width:min(var(--popup-width, 360px), calc(100vw - 34px)) !important; max-width:calc(100vw - 34px) !important; margin:7px 8px; }
    .leaflet-popup-content-wrapper { max-height:none !important; overflow:visible !important; overscroll-behavior:none; touch-action:none; }
    .popup { max-width:calc(100vw - 34px); font-size:var(--popup-font-size, 12px); line-height:1.24; }
    .side-tabs { gap:6px; margin:8px 0 10px; flex-wrap:wrap; }
    .side-tab { padding:6px 8px; font-size:12px; border-radius:8px; }
    .side-tab span { font-size:11px; margin-left:-6px; }
    .side-panel { padding-top:8px; }
    .surface-card > br { display:initial; }
    .surface-card > span { display:initial; }
    .surface-card > span + span::before { content:none; }
    .links { display:block; }
    .cart-add { padding:7px 9px; margin-top:6px; border-radius:8px; font-size:12px; }
    .status { margin-top:6px; padding:6px; font-size:12px; line-height:1.25; }
    .status > b { display:inline; }
    .month-list { display:block; margin-top:4px; }
    .month-row { display:grid; grid-template-columns:72px 72px 1fr; gap:5px; align-items:center; white-space:nowrap; margin:2px 0; font-size:12px; line-height:1.25; }
    .month-price { display:block; }
    .free, .sold, .reserve { padding:1px 5px; border-radius:4px; overflow:visible; text-overflow:clip; }
    .photo-frame { height:min(var(--photo-height, 150px), 26vh); min-height:min(var(--photo-height, 150px), 26vh); margin-top:7px; }
    .leaflet-popup-close-button { width:32px !important; height:32px !important; line-height:30px !important; font-size:22px !important; }
  }

  @media (max-width: 950px) and (orientation: landscape), (max-height: 520px) and (max-width: 950px) {
    .leaflet-popup { max-width:min(470px, calc(100vw - 14px)); }
    .leaflet-popup-content { width:min(var(--popup-width, 420px), calc(100vw - 24px), 430px) !important; max-width:calc(100vw - 24px) !important; margin:6px 8px; }
    .leaflet-popup-content-wrapper { max-height:none !important; overflow:visible !important; overscroll-behavior:none; touch-action:none !important; }
    .popup { max-width:calc(100vw - 28px); font-size:var(--popup-font-size, 11px); line-height:1.22; }
    .side-tabs { position:static; z-index:5; background:#fff; padding:0; margin:4px 0 6px; gap:6px; flex-wrap:wrap; }
    .side-tab { padding:5px 7px; font-size:11px; }
    .side-tab span { font-size:10px; margin-left:-4px; }
    .side-panel { padding-top:8px; }
    .surface-card > br { display:initial; }
    .surface-card > span { display:initial; }
    .surface-card > span + span::before { content:none; }
    .links { display:block; }
    .photo-frame { height:min(var(--photo-height, 128px), 35vh); min-height:min(var(--photo-height, 128px), 35vh); margin-top:6px; }
    .status { margin-top:6px; padding:6px; font-size:11px; line-height:1.22; }
    .status > b { display:inline; }
    .month-list { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px; }
    .month-row { display:grid; grid-template-columns:1fr auto; grid-template-areas:"name price" "status status"; gap:2px 6px; align-items:center; min-width:0; padding:5px 6px; border:1px solid #e5e7eb; border-radius:8px; background:#fff; font-size:10.5px; margin:0; line-height:1.14; white-space:normal; }
    .month-name { grid-area:name; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .month-price { grid-area:price; display:block; text-align:right; white-space:nowrap; font-size:10.5px; }
    .month-row .free, .month-row .sold, .month-row .reserve, .month-row .month-status-compact { grid-area:status; grid-column:auto; display:block; width:100%; box-sizing:border-box; margin-top:1px; padding:2px 5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; }
    .month-row .reserve, .month-row .month-status-compact.reserve { font-size:9.8px; letter-spacing:-.15px; }
    .cart-add { padding:6px 8px; margin-top:5px; font-size:11px; }
  }

  @media (max-width: 900px) {
    html, body { overflow:hidden; }
    header { display:block; padding:10px 12px; }
    h1 { font-size:17px; margin-bottom:3px; }
    .subtitle { font-size:11px; margin-left:-6px; }
    .metrics { justify-content:flex-start; margin-top:8px; gap:7px; }
    .metric { min-width:96px; padding:7px 9px; border-radius:10px; }
    .metric b { font-size:15px; }
    .layout { height:calc(100vh - 86px); height:calc(100dvh - 86px); grid-template-columns:1fr; grid-template-rows:minmax(150px, 28vh) minmax(0, 1fr); }
    aside { max-height:28vh; border-right:0; border-bottom:1px solid var(--line); padding:9px; }
    .cart-box { padding:9px; margin-bottom:9px; }
    .surface-item { padding:8px 76px 8px 9px; }
    main { height:100%; min-height:0; }
    #map { min-height:0; }
  }


  /* Телефон в горизонтальном положении: вместо вертикальной раскладки
     показываем список слева, карту справа, без необходимости прокрутки страницы. */
  @media (max-width: 950px) and (orientation: landscape), (max-height: 520px) and (max-width: 950px) {
    html, body { height:100%; height:100dvh; overflow:hidden; }
    .page { height:100vh; height:100dvh; min-height:100vh; min-height:100dvh; }
    header { height:44px; min-height:44px; padding:6px 10px; display:flex; align-items:center; gap:10px; overflow:hidden; }
    h1 { font-size:15px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .subtitle { font-size:10px; margin:1px 0 0; white-space:nowrap; }
    .metrics { display:none; }
    .layout { height:calc(100vh - 44px); height:calc(100dvh - 44px); grid-template-columns:minmax(220px, 34vw) minmax(0, 1fr); grid-template-rows:1fr; }
    aside { height:100%; max-height:none; min-height:0; overflow:auto; border-right:1px solid var(--line); border-bottom:0; padding:7px; -webkit-overflow-scrolling:touch; }
    main { height:100%; min-height:0; overflow:hidden; }
    #map { height:100%; min-height:0; }
    .cart-box { padding:7px; margin-bottom:7px; border-radius:10px; }
    .cart-title { margin-bottom:5px; font-size:13px; }
    .cart-row { padding:5px 0; font-size:11px; }
    .send-cart { padding:7px 8px; margin-top:6px; }
    .aside-title { margin:2px 0 7px; font-size:13px; }
    .sort-label { font-size:11px; }
    .sort-select { padding:6px 8px; margin-bottom:7px; }
    .surface-row { margin-bottom:6px; }
    .surface-item { padding:7px 66px 7px 8px; border-radius:10px; }
    .surface-item span { font-size:11px; }
    .surface-item small { font-size:10px; }
    .surface-cart-toggle { top:7px; right:7px; padding:5px 6px; font-size:10px; }
    .leaflet-popup { max-width:min(470px, calc(100vw - 14px)); }
    .leaflet-popup-content { width:min(var(--popup-width, 420px), calc(100vw - 24px), 430px) !important; max-width:calc(100vw - 24px) !important; margin:6px 8px; }
    .leaflet-popup-content-wrapper { max-height:none !important; overflow:visible !important; overscroll-behavior:none; touch-action:none !important; }
    .popup { max-width:calc(100vw - 28px); font-size:var(--popup-font-size, 10.5px); line-height:1.18; }
    .combined-popup > b { display:block; font-size:11px; margin-bottom:2px; }
    .side-tabs { position:static; z-index:5; background:#fff; padding:0; margin:3px 0 5px; gap:5px; flex-wrap:nowrap; }
    .side-tab { flex:1 1 0; min-width:0; padding:5px 6px; font-size:10px; }
    .side-tab span { font-size:9px; margin-left:0; }
    .side-panel { padding-top:4px; }
    .surface-card > br { display:none; }
    .surface-card > span { display:inline; }
    .surface-card > span + span::before { content:' · '; color:#98a2b3; }
    .links { display:none; }
    .photo-frame { height:min(var(--photo-height, 128px), 35vh); min-height:min(var(--photo-height, 128px), 35vh); margin-top:5px; }
    .status { margin-top:5px; padding:5px; font-size:10.5px; line-height:1.16; }

</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <h1>Карта рекламной кампании</h1>
      <div class="subtitle">Сформировано: 10.07.2026 10:22 МСК</div>
    </div>
    <div class="metrics">
      <div class="metric"><span>Поверхностей</span><b>227</b></div>
      <div class="metric"><span>На карте</span><b>227</b></div>
    </div>
  </header>
  <div class="layout">
    <aside>
      <div class="cart-box">
        <div class="cart-title">Корзина</div>
        <div id="cartEmpty" class="cart-empty">Пока ничего не выбрано</div>
        <div id="cartItems"></div>
        <label class="sort-label" for="requestMethod">Куда отправить заявку</label>
        <select id="requestMethod" class="sort-select request-method">
          <option value="telegram">Telegram</option>
          <option value="email">Почта</option>
        </select>
        <button id="sendCart" class="send-cart" type="button" disabled>Отправить заявку</button>
      </div>
      <div class="aside-title">Поверхности</div>
      <label class="sort-label">Сортировка</label>
      <select id="surfaceSort" class="sort-select">
        <option value="default">как в списке</option>
        <option value="gid">по GID</option>
        <option value="format">по формату</option>
        <option value="region">по региону</option>
        <option value="price_desc">по цене ↓</option>
        <option value="price_asc">по цене ↑</option>

<script>
function switchPopupSide(btn) {
  const root = btn && btn.closest ? btn.closest('.combined-popup') : null;
  if (!root) return false;
  const idx = String(btn.getAttribute('data-side') || '0');
  root.querySelectorAll('.side-tab').forEach(b => {
    const active = String(b.getAttribute('data-side')) === idx;
    b.classList.toggle('active', active);
    b.setAttribute('aria-selected', active ? 'true' : 'false');
  });
  root.querySelectorAll('.side-panel').forEach(panel => {
    const active = String(panel.getAttribute('data-side-panel')) === idx;
    panel.style.display = active ? 'block' : 'none';
  });
  if (typeof enablePhotoPinchZoom === 'function') enablePhotoPinchZoom(root);
  if (typeof syncCartState === 'function') syncCartState();
  if (typeof setActiveSurfaceItem === 'function') setActiveSurfaceItem(root.getAttribute('data-marker'), idx);
  return false;
}

function addToCartFromButton(btn) {
  const gid = btn && btn.getAttribute ? btn.getAttribute('data-cart-gid') : null;
  if (window.toggleCart) { window.toggleCart(gid); return; }
  if (window.addToCart) { window.addToCart(gid); }
}

function isLandscapeCompactViewport() {
  const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
  const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
  return (vw <= 950 && vh <= 520 && vw > vh);
}

function enableMobileMapDoubleTapZoom(mapInstance) {
  if (!mapInstance || mapInstance.__oohDoubleTapZoomEnabled) return;
  mapInstance.__oohDoubleTapZoomEnabled = true;
  const el = mapInstance.getContainer && mapInstance.getContainer();
  if (!el) return;
  let lastTapAt = 0;
  let lastTapX = 0;
  let lastTapY = 0;
  el.addEventListener('touchend', function(ev) {
    if (!ev || !ev.changedTouches || ev.changedTouches.length !== 1) return;
    if (ev.touches && ev.touches.length > 0) return;
    const target = ev.target;
    if (target && target.closest && target.closest('.leaflet-popup, .leaflet-control, .surface-list, .side-panel, .marker-dot, .marker-label, button, a, input, textarea, select')) return;
    const t = ev.changedTouches[0];
    const now = Date.now();
    const dx = Math.abs(t.clientX - lastTapX);
    const dy = Math.abs(t.clientY - lastTapY);
    if (now - lastTapAt < 310 && dx < 34 && dy < 34) {
      try {
        const pt = mapInstance.mouseEventToContainerPoint(ev);
        mapInstance.setZoomAround(pt, Math.min(mapInstance.getMaxZoom ? mapInstance.getMaxZoom() : 19, mapInstance.getZoom() + 1));
        ev.preventDefault();
        ev.stopPropagation();
      } catch(e) {
        try { mapInstance.zoomIn(); } catch(_) {}
      }
      lastTapAt = 0;
      return;
    }
    lastTapAt = now;
    lastTapX = t.clientX;
    lastTapY = t.clientY;
  }, {passive:false});
}

function updatePopupResponsiveSize() {
  const zoom = window.map && window.map.getZoom ? window.map.getZoom() : 14;
  const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
  const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
  const landscapeCompact = isLandscapeCompactViewport();
  const factor = Math.max(0.58, Math.min(1.05, 0.58 + (zoom - 9) * 0.06));
  const width = Math.round(landscapeCompact ? Math.min(430, Math.max(360, vw - 28)) : Math.min(410 * factor, window.innerWidth - 76));
  const photoH = Math.round(landscapeCompact ? Math.max(104, Math.min(138, vh * 0.34)) : (vw <= 700 ? Math.max(58, Math.min(82, vh * 0.15)) : Math.max(118, Math.min(210, 170 * factor + 20))));
  const fontSize = Math.round(landscapeCompact ? 11 : (vw <= 700 ? 10.5 : Math.max(10, Math.min(13, 12.7 * factor))));
  const popupMaxH = landscapeCompact ? 9999 : (vw <= 700 ? 9999 : Math.max(260, Math.min(560, vh - 72)));
  document.documentElement.style.setProperty('--popup-width', width + 'px');
  document.documentElement.style.setProperty('--photo-height', photoH + 'px');
  document.documentElement.style.setProperty('--popup-font-size', fontSize + 'px');
  document.documentElement.style.setProperty('--popup-max-height', popupMaxH + 'px');
  document.querySelectorAll('.leaflet-popup-content').forEach(el => { el.style.width = width + 'px'; el.style.fontSize = fontSize + 'px'; });
  document.querySelectorAll('.leaflet-popup-content-wrapper').forEach(el => { el.style.maxHeight = popupMaxH + 'px'; });
  if (window.map && window.map._popup && window.map._popup.update && !window.__oohSuppressPopupAutoPan) {
    setTimeout(() => {
      if (!window.__oohSuppressPopupAutoPan) window.map._popup.update();
    }, 0);
  }
}
function setOpenPopupAutoPan(enabled) {
  try {
    const m = window.map;
    if (!m || !m._popup || !m._popup.options) return;
    const popup = m._popup;
    if (popup.__oohOriginalAutoPan === undefined) {
      popup.__oohOriginalAutoPan = popup.options.autoPan;
    }
    popup.options.autoPan = enabled ? popup.__oohOriginalAutoPan : false;
  } catch(e) {}
}
function afterPopupImageLayout() {
  if (typeof updatePopupResponsiveSize === 'function') updatePopupResponsiveSize();
  if (typeof keepPopupInView === 'function') {
    setTimeout(keepPopupInView, 20);
    setTimeout(keepPopupInView, 220);
  }
  if (typeof forceMapResize === 'function') setTimeout(forceMapResize, 20);
}
window.oohAfterPopupImage = afterPopupImageLayout;

function finishPopupImage(img, ok) {
  const frame = img && img.closest ? img.closest('.photo-frame') : null;
  if (!frame) return;

  setActiveSurfaceItem(markerId, sideIdx || '0');

    return;
  }
  const marker = markerById[markerId];
  if (!marker) return;
  const targetZoom = Math.max(map.getZoom(), 16);
  const targetLatLng = marker.getLatLng();
  map.stop();

  // Убраны повторные setTimeout-центровки, из-за которых карта сначала

    const popupEl = marker.getPopup() && marker.getPopup().getElement ? marker.getPopup().getElement() : null;
    if (popupEl && sideIdx !== null && sideIdx !== undefined) {
      const applyRequestedSide = () => {
        const currentPopupEl = marker.getPopup() && marker.getPopup().getElement ? marker.getPopup().getElement() : null;
        const tab = currentPopupEl && currentPopupEl.querySelector ? currentPopupEl.querySelector('.side-tab[data-side="' + String(sideIdx) + '"]') : null;

      setTimeout(applyRequestedSide, 80);

      const mapEl = document.getElementById('map');

      const pr = popupEl2.getBoundingClientRect();
      const mr = mapEl.getBoundingClientRect();
      if (!pr.width || !pr.height || !mr.width || !mr.height) return;
      const dx = (pr.left + pr.width / 2) - (mr.left + mr.width / 2);
      const dy = (pr.top + pr.height / 2) - (mr.top + mr.height / 2);

  text.style.cssText = 'font-size:14px;line-height:1.45;color:#334155;margin:0 0 16px;';

  const btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = 'Хорошо';
  btn.style.cssText = 'width:100%;border:0;border-radius:14px;background:#0f172a;color:#fff;padding:12px 14px;font-size:14px;font-weight:800;cursor:pointer;';

  const close = () => overlay.remove();
  btn.addEventListener('click', close);
  overlay.addEventListener('click', (ev) => {
    if (ev.target === overlay) close();
  });
  document.addEventListener('keydown', function onEsc(ev) {
    if (ev.key === 'Escape') {
      document.removeEventListener('keydown', onEsc);
      close();
    }
  });

  card.appendChild(title);
  card.appendChild(text);
  card.appendChild(btn);
  overlay.appendChild(card);
  document.body.appendChild(overlay);
  btn.focus({preventScroll:true});
}

function submitTelegramMessage(text) {
  if (!telegramBotToken || !telegramChatId) {
    alert('Не задан TELEGRAM_BOT_TOKEN или TELEGRAM_CHAT_ID.');
    return;
  }
  const frameName = 'tgSubmitFrame_' + Date.now();
  const iframe = document.createElement('iframe');
  iframe.name = frameName;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'https://api.telegram.org/bot' + encodeURIComponent(telegramBotToken).replace(/%3A/gi, ':') + '/sendMessage';
  form.target = frameName;
  form.style.display = 'none';

  const fields = {
    chat_id: telegramChatId,
    text: text,
    disable_web_page_preview: 'true'
  };
  Object.keys(fields).forEach(key => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = key;
    input.value = fields[key];
    form.appendChild(input);
  });

  document.body.appendChild(form);
  form.submit();
  setTimeout(showTelegramSuccessPopup, 350);
  setTimeout(() => {
    form.remove();
    iframe.remove();
  }, 5000);
}

function buildTelegramRequestText() {
  const lines = ['🟢 Новая заявка с карты поверхностей', ''];
  lines.push('Клиент: ' + (clientName || 'не указан'));
  if (clientContact) lines.push('Контакт: ' + clientContact);
  if (mapGeneratedAt) lines.push('Сформировано: ' + mapGeneratedAt);
  lines.push('Карта: ' + window.location.href);
  lines.push('', 'Поверхности:');
  cart.forEach((item, idx) => {
    lines.push(`${idx + 1}. № ${item.gid}`);
    if (item.format || item.region) lines.push(`   ${item.format} · ${item.region}`);
    if (item.side) lines.push(`   Сторона: ${item.side}`);
    if (item.price) lines.push(`   Стоимость в месяц: ${item.price}`);
    if (item.ots !== undefined && item.ots !== null && String(item.ots).trim()) lines.push(`   OTS: ${item.ots}`);
    if (item.light) lines.push(`   Свет: ${item.light}`);
    if (item.presentation) lines.push(`   Презентация: ${item.presentation}`);
    lines.push('');
  });
  let text = lines.join('\n');
  if (text.length > 3900) text = text.slice(0, 3850) + '\n\n…список обрезан, полная подборка доступна по ссылке на карту.';
  return text;
}

function buildEmailRequestBody() {
  const lines = ['Здравствуйте!', '', 'Прошу забронировать следующие рекламные поверхности:', ''];
  cart.forEach((item, idx) => {
    lines.push(`${idx + 1}. № ${item.gid}`);
    if (item.side) lines.push(`Сторона: ${item.side}`);
    if (item.format || item.region) lines.push(`Формат / регион: ${item.format || ''}${item.format && item.region ? ' · ' : ''}${item.region || ''}`);
    if (item.price) lines.push(`Стоимость в месяц: ${item.price}`);
    if (item.ots !== undefined && item.ots !== null && String(item.ots).trim()) lines.push(`OTS: ${item.ots}`);
    if (item.light) lines.push(`Свет: ${item.light}`);
    if (item.presentation) lines.push(`Презентация: ${item.presentation}`);
    lines.push('');
  });
  lines.push('Спасибо.');
  lines.push('', 'Ссылка на карту: ' + window.location.href);
  return lines.join('\n');
}

function submitEmailRequest() {
  if (!cartEmail) {
    alert('Не задан email для заявки.');
    return;
  }
  const subject = encodeURIComponent('Заявка на бронирование рекламных поверхностей');
  const body = encodeURIComponent(buildEmailRequestBody());
  window.location.href = 'mailto:' + encodeURIComponent(cartEmail) + '?subject=' + subject + '&body=' + body;
}

function currentRequestMethod() {
  const select = document.getElementById('requestMethod');
  return select && select.value ? select.value : 'telegram';
}

function updateSendButtonLabel() {
  const btn = document.getElementById('sendCart');
  if (!btn) return;
  const method = currentRequestMethod();
  btn.textContent = method === 'email' ? 'Отправить заявку на почту' : 'Отправить заявку в Telegram';
}

const requestMethodSelect = document.getElementById('requestMethod');
if (requestMethodSelect) requestMethodSelect.addEventListener('change', updateSendButtonLabel);

const sendCartBtn = document.getElementById('sendCart');
if (sendCartBtn) {
  sendCartBtn.addEventListener('click', () => {
    if (!cart.length) return;
    const method = currentRequestMethod();
    if (method === 'email') {
      submitEmailRequest();
      sendCartBtn.textContent = 'Открываю почту…';
    } else {
      submitTelegramMessage(buildTelegramRequestText());
      sendCartBtn.textContent = 'Заявка отправляется в Telegram…';
    }
    setTimeout(updateSendButtonLabel, 2200);
  });
}
updateSendButtonLabel();
renderCart();
</script>
</body>
</html>
